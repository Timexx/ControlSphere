# ControlSphere — NAS-optimised Docker Compose
# Builds locally instead of pulling from ghcr.io (avoids registry timeouts).
# Based on the Micro profile (1–10 agents, 512 MB server RAM).
#
# Usage:
#   docker compose -f docker-compose.nas.yml up -d
#   docker compose -f docker-compose.nas.yml up -d --build   # rebuild after update
#   docker compose -f docker-compose.nas.yml logs -f server   # follow logs
#   docker compose -f docker-compose.nas.yml down              # stop

services:

  # -- PostgreSQL ----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: maintainer
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: maintainer
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - secrets_data:/run/secrets:ro
    depends_on:
      init-secrets:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maintainer"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 128M
    command: >
      postgres
        -c shared_buffers=64MB
        -c max_connections=20

  # -- Init: generate shared secrets once ----------------------------------
  init-secrets:
    image: alpine:3.19
    entrypoint: /bin/sh
    command:
      - -c
      - |
        if [ ! -f /secrets/postgres_password ]; then
          apk add --no-cache openssl > /dev/null 2>&1
          PW=$$(openssl rand -base64 24 | tr -d '+/=\n' | head -c 32)
          echo "$$PW" > /secrets/postgres_password
          chmod 600 /secrets/postgres_password
          echo "[init-secrets] Generated postgres_password."
        else
          echo "[init-secrets] postgres_password already exists, skipping."
        fi
    volumes:
      - secrets_data:/secrets

  # -- ControlSphere Server ------------------------------------------------
  # Built locally from ./server — no registry pull needed.
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: "0.0.0.0"
      HEARTBEAT_METRICS_INTERVAL_MS: 30000
      HEARTBEAT_PORTS_INTERVAL_MS: 120000
      DB_CONNECTION_LIMIT: 10
    volumes:
      - secrets_data:/app/.secrets
      - agent_downloads:/app/public/downloads
    depends_on:
      init-secrets:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          memory: 256M

volumes:
  postgres_data:
  secrets_data:
  agent_downloads:
